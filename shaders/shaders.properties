# [ZenShader] Configuration
# GLSL 120 | Iris/OptiFine Compatible | 120 FPS Target

screen.columns=3
screen.padding=6

## Bloom & Post-Processing
screen.Bloom=true
uniform.float.bloomIntensity=1.0 0.0 3.0 0.1 screen.Bloom

## Shadow Quality
screen.Shadows=true
uniform.float.shadowQuality=1.0 0.5 2.0 0.1 screen.Shadows

## Water & Reflection
screen.Water=true
uniform.float.waveHeight=1.0 0.3 2.0 0.1 screen.Water

## Specular Highlights
screen.Specular=true
uniform.float.specularStrength=0.8 0.0 1.5 0.1 screen.Specular

## Fog Density
screen.Fog=true
uniform.float.fogDensity=0.2 0.0 0.5 0.05 screen.Fog

# Color Grading
screen.Tone=true
uniform.float.saturation=1.0 0.5 1.5 0.1 screen.Tone
uniform.float.brightness=1.0 0.7 1.3 0.05 screen.Tone

# Performance
shadowMapResolution=2048
noiseTextureResolution=64
colortex0Format=RGBA16F
colortex1Format=RGBA16F
colortex2Format=RGBA16F
colortex3Format=RGBA8
colortex4Format=R32F

# Iris/OptiFine Compat
renderScale=1.0
weatherEnabled=true
underwaterOverlay=false
