# [ZenShader] Block Material Definitions
# Specular, Emission, Normal mapping for terrain

# Stone & Rock
block.1=stone granite diorite andesite cobblestone
block.1.specular=0.15
block.1.roughness=0.95

# Dirt & Soil
block.2=dirt grass_block podzol mycelium
block.2.specular=0.0
block.2.roughness=1.0

# Wood
block.3=oak_log spruce_log birch_log jungle_log acacia_log dark_oak_log
block.3.specular=0.1
block.3.roughness=0.85

# Planks (slightly less rough than logs)
block.4=oak_planks spruce_planks birch_planks jungle_planks acacia_planks dark_oak_planks
block.4.specular=0.12
block.4.roughness=0.80

# Glass & Smooth Stone
block.5=glass smooth_stone
block.5.specular=0.5
block.5.roughness=0.1

# Metal (Iron, etc)
block.6=iron_block raw_iron
block.6.specular=0.6
block.6.roughness=0.3

# Gold
block.7=gold_block raw_gold
block.7.specular=0.7
block.7.roughness=0.25

# Quartz (high spec, low rough)
block.8=quartz_block
block.8.specular=0.65
block.8.roughness=0.15

# Lava (emissive, no specular)
block.9=lava
block.9.emission=0.95
block.9.specular=0.0

# Sand (matte)
block.10=sand red_sand
block.10.specular=0.0
block.10.roughness=1.0

# Leaves (low spec)
block.11=oak_leaves spruce_leaves birch_leaves jungle_leaves acacia_leaves dark_oak_leaves
block.11.specular=0.05
block.11.roughness=0.9

# Default (unspecified blocks)
block.default.specular=0.05
block.default.roughness=0.9
